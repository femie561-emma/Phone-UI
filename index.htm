<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Phone UI WEbsite</title>
</head>
<body>
    <header><h2>Charging my Iphone.📱📱</h2></header>
    <div class="container">
        <div class="phonw-wrapper">
    <div class="phone">
        <div class="top-screen">.
        <div class="speaker"></div>
        <div class="flex"> 
            
            <div class="left-button">
                <div class="top-left-button"></div>
                <div class="down-left-button"></div>
            </div>

            <div class="right-button"></div>
        </div>
        <div class="camera"></div>
        </div>
        <div class="screen">
            <section>
                <h2 class="orange">Emmanuel</h2>
                <span class="purple">My expensive Iphone 📱</span>
                
            </section>
            <div class="battery">
                <div class="battery-fill"><span class="lightning
                    ">⚡</span></div>
                <p class="charging-text">charging...
                </p>
            </div>
        </div>
    </div>

    <div class="tools">
        <div class="plug"></div>
        <div class="usb">
            <div class="usb-vertical"></div>
            <div class="usb-curve"></div>
        </div>
        <div class="socket">
        <button class="switch">on/off</button>
    </div>
    </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
